<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <title>Rauchmelder</title>
  <rect width="100" height="100" rx="22" fill="#e63946"/>
  <!-- Gehäuse Kreis -->
  <circle cx="50" cy="52" r="28" fill="white"/>
  <!-- Lautsprecher-Gitter (kleine Kreise) -->
  <circle cx="50" cy="52" r="9" fill="#e63946"/>
  <circle cx="50" cy="52" r="4" fill="white"/>
